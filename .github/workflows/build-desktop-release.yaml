name: Build Desktop Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            task: packageReleaseDmg
            artifact_path: desktopApp/build/compose/binaries/main-release/dmg/*.dmg

          - os: macos-15-intel
            arch: amd64
            task: packageReleaseDmg
            artifact_path: desktopApp/build/compose/binaries/main-release/dmg/*.dmg

          - os: windows-latest
            arch: amd64
            task: packageReleaseMsi
            artifact_path: desktopApp/build/compose/binaries/main-release/msi/*.msi

          - os: windows-11-arm
            arch: arm64
            task: packageReleaseMsi
            artifact_path: desktopApp/build/compose/binaries/main-release/msi/*.msi

          - os: ubuntu-latest
            arch: amd64
            task: packageReleaseDeb
            artifact_path: desktopApp/build/compose/binaries/main-release/deb/*.deb

          - os: ubuntu-24.04-arm
            arch: arm64
            task: packageReleaseDeb
            artifact_path: desktopApp/build/compose/binaries/main-release/deb/*.deb

          - os: ubuntu-latest
            arch: amd64
            task: packageReleaseAppImage
            artifact_path: desktopApp/build/compose/binaries/main-release/app/*.AppImage

          - os: ubuntu-24.04-arm
            arch: arm64
            task: packageReleaseAppImage
            artifact_path: desktopApp/build/compose/binaries/main-release/app/*.AppImage

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JBR
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: '25'
          cache: gradle

      - name: Create config.properties
        shell: bash
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> config.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> config.properties

      - name: Build with Gradle
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="1.0.0"
          fi

          ./gradlew :desktopApp:${{ matrix.task }} -PappVersion=$VERSION -i

      - name: Upload jpackage logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jpackage-logs-${{ matrix.os }}
          path: |
            desktopApp/build/compose/logs/createReleaseDistributable/*-out.txt
            desktopApp/build/compose/logs/createReleaseDistributable/*-err.txt
          if-no-files-found: ignore

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
